source = ~/.config/hypr/mocha.conf

################
### MONITORS ###
################

monitorv2 {
    output = eDP-1
    mode = 1920x1080@120.00
    position = auto
    scale = 1
}
monitorv2 {
    output = DP-1
    mode = 2560x1440@165.00
    position = auto
    scale = 1
}

###################
### MY PROGRAMS ###
###################

$ipc = dms ipc call
$terminal = ghostty
$fileManager = dolphin
$browser = helium-browser
$menu = vicinae toggle || $ipc launcher toggle
$emoji = vicinae vicinae://extensions/vicinae/core/search-emojis || $ipc launcher toggleQuery :e
$windows = vicinae vicinae://extensions/vicinae/wm/switch-windows || $ipc launcher toggleQuery !
$screenshotArea = grimblast --freeze --notify copysave area $HOME/Pictures/Screenshots/"$(date '+%FT%T.%N').png"
$screenshotScreen = grimblast --freeze --notify copysave output $HOME/Pictures/Screenshots/"$(date '+%FT%T.%N').png"

#################
### AUTOSTART ###
#################

exec-once = dms run
exec-once = /usr/lib/pam_kwallet_init
exec-once = playerctld daemon
exec-once = dolphin --daemon
exec-once = kdeconnectd
exec-once = xembedsniproxy
exec-once = sh -c "sleep 1s && bitwarden --silent"
exec-once = vicinae server

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,40
env = HYPRCURSOR_SIZE,40
env = XCURSOR_THEME,BreezeX-RoséPine
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = XDG_MENU_PREFIX,arch-
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 4

    border_size = 2

    col.active_border = $mauve $pink 90deg
    col.inactive_border = $surface1

    resize_on_border = false

    allow_tearing = true

    layout = dwindle
    no_focus_fallback = true
}

# only for content:game
render {
    direct_scanout = 2
}

decoration {
    rounding = 10
    rounding_power = 2

    # change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    middle_click_paste = false
}

# unscale XWayland
xwayland {
  force_zero_scaling = true
}

plugin {
    # use with these params - game-performance mangohud %command% -vulkan -window -w 1280 -h 960 -vulkan
    # csgo-vulkan-fix {
    #     res_w = 1280
    #     res_h = 960
    #
    #     class = cs2
    # }
}

#############
### INPUT ###
#############

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle,ctrl:nocaps
    kb_rules =

    follow_mouse = 1

    touchpad {
        disable_while_typing = true
        natural_scroll = true
    }

    accel_profile = flat
    sensitivity = 0
}

device {
    name = elan1201:00-04f3:3098-touchpad
    accel_profile = adaptive
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = ALT, SPACE, exec, $menu
bind = $mainMod SHIFT, E, exec, $emoji
bind = $mainMod, W, exec, $windows
bind = $mainMod, P, pin, active
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen,
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod ALT, V, cyclenext,
bind = $mainMod CTRL SHIFT, L, exec, loginctl lock-session
bind = $mainMod, A, exec, ~/.local/bin/audio_changer.py
bind = $mainMod, N, exec, $ipc notifications toggle
bind = $mainMod, up, sendshortcut, ,page_up,
bind = $mainMod, down, sendshortcut, ,page_down,
bind = $mainMod, escape, exec, dms restart
bind = $mainMod, grave, exec, $ipc hypr toggleOverview
bind = $mainMod, comma, exec, $ipc settings toggle

# move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# swap windows
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d

# resize windows                       X   Y
bind = $mainMod CTRL, h, resizeactive, -60 0
bind = $mainMod CTRL, l, resizeactive,  60 0
bind = $mainMod CTRL, k, resizeactive, 0 -60
bind = $mainMod CTRL, j, resizeactive, 0 60

# switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , Print, exec, $screenshotArea
bind = SHIFT, Print, exec, $screenshotScreen
bind = $mainMod, S, exec, $screenshotArea
bind = $mainMod SHIFT, S, exec, $screenshotScreen

# multimedia keys
bind = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind = ,XF86AudioLowerVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = ,XF86AudioPlay, exec, $ipc mpris playPause
bind = ,XF86AudioNext, exec, $ipc mpris next
bind = ,XF86AudioPrev, exec, $ipc mpris previous
bind = ,XF86MonBrightnessUp, exec, $ipc brightness increment 5 ''
bind = ,XF86MonBrightnessDown, exec, $ipc brightness decrement 5 ''

# switch to DP-1
bind = $mainMod SHIFT, comma, exec, ddcutil -b 8 setvcp 60 0x0f
# switch to HDMI-1
bind = $mainMod SHIFT, period, exec, ddcutil -b 8 setvcp 60 0x11

# clipboard
bind = $mainMod, V, exec, vicinae vicinae://extensions/vicinae/clipboard/history || $ipc launcher clipboard

# discord mute
bind = $mainMod, M, sendshortcut, CTRL SHIFT, M, class:^(discord)$

##############################
### WINDOWS AND WORKSPACES ###
##############################

workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

# you'll probably like this.
# windowrule = match:class .*, suppress_event maximize
# fix some dragging issues with XWayland
# windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus on

# steam
windowrule = match:class steam,match:title negative:Steam, float on
windowrule = match:class steam_app_[0-9]+, immediate on  # Allow tearing for steam games
windowrule = match:class steam_app_[0-9]+, idle_inhibit always # Always idle inhibit when playing a steam game
windowrule = match:class steam_app_[0-9]+, content game  # content game for direct_scanout
windowrule = match:class cs2, immediate on
windowrule = match:class cs2, idle_inhibit always
windowrule = match:class cs2, content game

# thunderbird
windowrule = match:class org.mozilla.Thunderbird,match:initial_title negative:Mozilla Thunderbird, float on

# no screensharing for password managers
windowrule = match:class ^org\.keepassxc\.KeePassXC$, no_screen_share on
windowrule = match:class ^org\.kde\.kwalletmanager$, no_screen_share on
windowrule = match:class ^org\.gnome\.World\.Secrets$, no_screen_share on
windowrule = match:class ^1Password$, no_screen_share on

windowrule { 
    name = picture-in-picture
    match:title = Picture(-| )in(-| )[Pp]icture
    float = on
    keep_aspect_ratio = on
    border_size = 1
    pin = on
}

windowrule { 
    name = telegram-media-view
    match:class = org.telegram.desktop
    match:title = Media viewer
    float = on
    center = 1
    maximize = on
    idle_inhibit = focus
}

layerrule { 
    name = vicinae
    match:namespace = vicinae
    blur = on
    ignore_alpha =  0
    no_anim = on
}
